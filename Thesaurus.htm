<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" lang="fr" xml:lang="fr">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Thesaurus</title>
    <link rel="stylesheet" type="text/css" href="StyleThesaurus.css" />
    <link rel="stylesheet" type="text/css" href="StyleHUD.css" />

    <script src="WebGl.js"></script>
    <script src="ShaderCouleursTextures.js"></script>
    <script src="glMatrix-0.9.5.min.js"></script>
    <script src="Transformations.js"></script>
    <script src="./Objets/Camera.js"></script>
    <script src="Textures.js"></script>
    <script src="Dedale.js"></script>
    <script src="Objets3D.js"></script>
    <script src="Dessin.js"></script>
    <script src="Niveaux.js"></script>
    <script src="./Objets/Tresor.js"></script>
    <script src="./Objets/Fleches.js"></script>
    <script src="./Objets/Pointeur_joueur.js"></script>


    <script type="text/javascript">

        // ── DANS Thesaurus.html ── ajout au début du script ──────────────
        const VITESSE_MAX = 0.008; // ← ajuste la vitesse ici

        var DUREE_NIVEAU_TEST = 60;
        var intervalleMinuterie;

        var touchesEnfoncees = {};
        var boucleActive = false;

        var objgl = null;
        var objProgShaders = null;
        var objScene3D = null;

        var TEX_TRANSPARENT = 0;
        var TEX_OUVRABLES = 1;
        var TEX_TRESOR = 2;
        var TEX_CIEL = 3;
        var TEX_FIXE = 4;

        const HAUTEUR_PLAFOND = 1.5;

        function redimensionnerCanvas() {
            var objCanvas = document.getElementById('monCanvas');
            objCanvas.width = window.innerWidth;
            objCanvas.height = window.innerHeight;

            if (objgl && objProgShaders && objScene3D) {
                effacerCanevas(objgl);
                dessiner(objgl, objProgShaders, objScene3D);
            }
        }

        async function init() {
            var objCanvas = document.getElementById('monCanvas');

            objgl = initWebGL(objCanvas);
            objProgShaders = initShaders(objgl);
            objScene3D = await initScene3D(objgl);

            //document.addEventListener('keydown', deplacerCamera);
            // ── Remplace document.addEventListener('keydown', deplacerCamera) par : ──

            document.addEventListener('keydown', function (event) {
                touchesEnfoncees[event.keyCode] = true;

                // Touches spéciales (vue aérienne, espace) gérées ici une seule fois
                if (event.keyCode === 33) { // Page Up → vue aérienne
                    if (!objScene3D.binVueAerienne) {
                        objScene3D.cameraJoueur = objScene3D.camera.slice();
                        objScene3D.binVueAerienne = true;
                        objScene3D.binTriche = false;
                        var camera = objScene3D.camera;
                        setPositionsCameraXYZ([15.5, 37, 15.5], camera);
                        setCiblesCameraXYZ([15.5, 0, 15.5], camera);
                        setOrientationsXYZ([0, 0, 1], camera);
                    }
                    effacerCanevas(objgl);
                    dessiner(objgl, objProgShaders, objScene3D);
                }
                else if (event.keyCode === 34) { // Page Down → retour joueur
                    if (objScene3D.binVueAerienne && objScene3D.cameraJoueur) {
                        objScene3D.camera = objScene3D.cameraJoueur.slice();
                        objScene3D.binVueAerienne = false;
                        objScene3D.binTriche = false;
                    }
                    effacerCanevas(objgl);
                    dessiner(objgl, objProgShaders, objScene3D);
                }
                else if (event.keyCode === 32) { // Espace → détruire mur
                    event.preventDefault();
                    if (objScene3D.binVueAerienne) {
                        if (event.ctrlKey && event.shiftKey) {
                            objScene3D.binTriche = !objScene3D.binTriche;
                        }
                    } else {
                        let scoreActuel = parseInt(document.getElementById('score').innerText);

                        if (objScene3D.nbMursDetruisables > 0 && scoreActuel >= 50) {
                            if (detruireMurEnFace(objScene3D.camera, objScene3D.dedale)) {
                                objScene3D.nbMursDetruisables--;

                                document.getElementById('ouvreursMurs').innerText = objScene3D.nbMursDetruisables;

                                scoreActuel -= 50;
                                document.getElementById('score').innerText = scoreActuel;
                            }
                        }
                    }
                    effacerCanevas(objgl);
                    dessiner(objgl, objProgShaders, objScene3D);
                }

                // Lance la boucle si pas encore active
                if (!boucleActive) {
                    boucleActive = true;
                    deplacerCamera();
                }
            });

            document.addEventListener('keyup', function (event) {
                touchesEnfoncees[event.keyCode] = false;
            });
            document.addEventListener('mousemove', deplacerCameraSouris);
            objCanvas.addEventListener('click', function () {
                if (objCanvas.requestPointerLock) {
                    objCanvas.requestPointerLock();
                }
            });
            document.addEventListener('pointerlockchange', function () {
                if (document.pointerLockElement === objCanvas) {
                    objCanvas.style.cursor = 'none';
                    // Start the render loop when mouse is captured
                    if (!boucleActive) {
                        boucleActive = true;
                        deplacerCamera();
                    }
                } else {
                    objCanvas.style.cursor = 'crosshair';
                }
            });

            objgl.enable(objgl.DEPTH_TEST);
            objgl.disable(objgl.CULL_FACE);

            window.addEventListener('resize', redimensionnerCanvas);
            redimensionnerCanvas();
        }

        function demarrer() {
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('hud-container').style.display = 'flex';
            document.getElementById('monCanvas').focus();

            demarrerMinuterie();
        }

        async function initScene3D(objgl) {
            var objScene3D = new Object();
            var tabObjets3D = new Array();

            objScene3D.dedale = creerDedale(31);
            objScene3D.nbMursDetruisables = 4; // nombre de murs que le joueur peut détruire
            objScene3D.textures = await creerTextures(objgl, [
                './Images/Transparent.gif',
                './Images/brick.jpg',
                './Images/coffre.jpg',
                './Images/Cloudy_sky.png',
                './Images/bedrock2.avif'
            ]);

            // ── PLANCHER COULOIRS ──────────────────────────────────────
            let plancherCouloir = new Object();
            plancherCouloir.vertex = creerGeometriePlan(objgl);
            plancherCouloir.couleurs = creerCouleursBuffer(objgl, [0.3, 0.0, 0.0, 1.0], 4);
            plancherCouloir.maillage = null;
            plancherCouloir.texels = null;
            plancherCouloir.transformations = creerTransformations();
            plancherCouloir.vertex.typeDessin = objgl.TRIANGLE_FAN;
            setPositionsXYZ([15.5, 0, 15.5], plancherCouloir.transformations);
            setEchellesXYZ([15.5, 1, 15.5], plancherCouloir.transformations);
            plancherCouloir.typeObjet = "plancher";
            tabObjets3D.push(plancherCouloir);

            // ── PLANCHER ENCLOS ────────────────────────────────────────
            let plancherEnclos = new Object();
            plancherEnclos.vertex = creerGeometriePlan(objgl);
            plancherEnclos.couleurs = creerCouleursBuffer(objgl, [0.6, 0.4, 0.1, 1.0], 4);
            plancherEnclos.maillage = null;
            plancherEnclos.texels = null;
            plancherEnclos.transformations = creerTransformations();
            plancherEnclos.vertex.typeDessin = objgl.TRIANGLE_FAN;
            setPositionsXYZ([15.5, 0.01, 15.5], plancherEnclos.transformations);
            setEchellesXYZ([1.5, 1, 1.5], plancherEnclos.transformations);
            plancherEnclos.typeObjet = "plancher";
            tabObjets3D.push(plancherEnclos);

            // ── PLAFOND ────────────────────────────────────────────────
            let plafond = creerPlanTexturé(objgl, TEX_CIEL, 1.0);
            setPositionsXYZ([15.5, HAUTEUR_PLAFOND, 15.5], plafond.transformations);
            setEchellesXYZ([15.5, 1, 15.5], plafond.transformations);
            //setAngleX(180, plafond.transformations); // retourner pour regarder vers le bas
            plafond.typeObjet = "plafond";
            tabObjets3D.push(plafond);

            // ── MURS ───────────────────────────────────────────────────
            for (let i = 0; i < TAILLE_DEDALE; i++) {
                for (let j = 0; j < TAILLE_DEDALE; j++) {
                    let cellule = objScene3D.dedale[i][j];
                    let mur = null;
                    if (cellule == MUR_FIXE) {
                        mur = creerCubeTexturé(objgl, TEX_FIXE, 1.0);
                    } else if (cellule == MUR_OUVRABLE) {
                        mur = creerCubeTexturé(objgl, TEX_OUVRABLES, 1.0); // or a different texture
                    }


                    if (mur != null) {
                        setPositionsXYZ([j, 0, i], mur.transformations);
                        setEchellesXYZ([1, HAUTEUR_PLAFOND, 1], mur.transformations); // murs à la bonne hauteur
                        mur.typeObjet = "mur";
                        tabObjets3D.push(mur);
                    }
                }
            }

            // ── TRÉSOR ─────────────────────────────────────────────────
            var tresor = creerTresore(objgl, [1.0, 1.0, 1.0, 1.0]);
            let randomXTresor, randomZTresor;
            do {
                randomXTresor = Math.floor(Math.random() * TAILLE_DEDALE);
                randomZTresor = Math.floor(Math.random() * TAILLE_DEDALE);
            } while (objScene3D.dedale[randomZTresor][randomXTresor] !== COULOIR);
            setPositionsXYZ([randomXTresor, 0, randomZTresor], tresor.transformations);
            setEchellesXYZ([0.7, 0.4, 0.4], tresor.transformations);
            tresor.typeObjet = "tresor";
            tabObjets3D.push(tresor);

            objScene3D.tresor = tresor;

            objScene3D.tabObjets3D = tabObjets3D;


            // ── CAMÉRA ─────────────────────────────────────────────────
            var camera = creerCamera();
            setPositionsCameraXYZ([15.5, 0.5, 15.5], camera);
            setCiblesCameraXYZ([15.5, 0.5, 16.5], camera);
            setOrientationsXYZ([0, 1, 0], camera);
            objScene3D.camera = camera;


            // ── FLÈCHES ─────────────────────────────────────────────────────
            objScene3D.tabFleches = [];
            let nbFleches = 18;

            let distanceMinimale = 3;

            for (let i = 0; i < nbFleches; i++) {
                var fleche = creerFleche(objgl, [1.0, 0.84, 0.0, 1.0]);
                fleche.typeObjet = "fleche";
                setEchellesXYZ([0.2, 0.2, 0.2], fleche.transformations);

                let randomX, randomZ;
                let celluleValide = false;

                while (!celluleValide) {
                    randomX = Math.floor(Math.random() * TAILLE_DEDALE);
                    randomZ = Math.floor(Math.random() * TAILLE_DEDALE);

                    if (objScene3D.dedale[randomZ][randomX] === COULOIR &&
                        !(randomX === randomXTresor && randomZ === randomZTresor)) {

                        let tropProche = false;

                        for (let j = 0; j < objScene3D.tabFleches.length; j++) {
                            let posFlecheExistante = getPositionsXYZ(objScene3D.tabFleches[j].transformations);

                            let xExistant = posFlecheExistante[0] - 0.5;
                            let zExistant = posFlecheExistante[2] - 0.5;

                            let distance = Math.sqrt(Math.pow(randomX - xExistant, 2) + Math.pow(randomZ - zExistant, 2));

                            if (distance < distanceMinimale) {
                                tropProche = true;
                                break;
                            }
                        }

                        if (!tropProche) {
                            celluleValide = true;
                        }
                    }
                }

                setPositionsXYZ([randomX + 0.5, 0.6, randomZ + 0.5], fleche.transformations);

                objScene3D.tabFleches.push(fleche);
                tabObjets3D.push(fleche);
            }

            pointeVersTresor(objScene3D);

            // ── Pointeur du joueur dans la vue aérienne ─────────────────────────────────────────────────────
            var pointeur = creerPointeur(objgl, [1.0, 0.0, 0.0, 1.0]);
            pointeur.typeObjet = "pointeur";
            setEchellesXYZ([0, 0, 0], pointeur.transformations);
            objScene3D.pointeur = pointeur;
            tabObjets3D.push(pointeur);

            const originalDessiner = dessiner;
            dessiner = function (objgl, objProgShaders, objScene3D) {
                if (objScene3D && objScene3D.pointeur) {
                    if (objScene3D.binVueAerienne && objScene3D.cameraJoueur) {
                        setEchellesXYZ([0.6, 1.0, 0.6], objScene3D.pointeur.transformations);

                        let camX = getPositionCameraX(objScene3D.cameraJoueur);
                        let camZ = getPositionCameraZ(objScene3D.cameraJoueur);

                        let cibleX = getCibleCameraX(objScene3D.cameraJoueur);
                        let cibleZ = getCibleCameraZ(objScene3D.cameraJoueur);

                        setPositionsXYZ([camX, HAUTEUR_PLAFOND - 0.05, camZ], objScene3D.pointeur.transformations);

                        let dx = cibleX - camX;
                        let dz = cibleZ - camZ;
                        let angleDegre = Math.atan2(dx, dz) * (180 / Math.PI);

                        setAngleY(angleDegre, objScene3D.pointeur.transformations);
                    } else {
                        setEchellesXYZ([0, 0, 0], objScene3D.pointeur.transformations);
                    }
                }
                originalDessiner(objgl, objProgShaders, objScene3D);
            };

            // ── MUR DE SORTIE DU SPAWN ─────────────────────────────────────
            var murSpawn = creerCubeTexturé(objgl, TEX_FIXE, 1.0);
            setPositionsXYZ([15, 0, 17], murSpawn.transformations);
            setEchellesXYZ([1, HAUTEUR_PLAFOND, 1], murSpawn.transformations);
            murSpawn.typeObjet = "mur";
            murSpawn.actif = false; // invisible and non-blocking until player leaves spawn
            tabObjets3D.push(murSpawn);
            objScene3D.murSpawn = murSpawn;
            objScene3D.aQuittéSpawn = false;


            return objScene3D;
        }

    </script>
</head>

<body onload="init()">
    <div class="game-container">

        <div id="menu-container">
            <h1 class="menu-title">Thesaurus</h1>
            <p class="menu-subtitle">Par Bolu Ali-Balogun et George Georgiev</p>
            <button id="btn-jouer" onclick="demarrer()">Jouer</button>
        </div>

        <canvas id="monCanvas" width="640" height="640" tabIndex="1" onkeydown="deplacerCamera(); return false">
            Votre navigateur ne supporte pas la balise canvas
        </canvas>

        <!-- The HUD Div -->
        <div id="hud-container" style="display: none;"> <!-- Hide HUD initially -->
            <span class="sHUD">Niveau: <span id="niveau" class="valeur-hud">1</span></span>
            <span class="sHUD">Ouvreurs murs: <span id="ouvreursMurs" class="valeur-hud">4</span></span>

            <div id="hud-timer" class="sHUD-timer sHUD-font-color-white">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 8 14"></polyline>
                </svg><span id="seconde" class="valeur-hud">60</span>
            </div>
            <span id="hud-score">Score: <span id="score" class="valeur-hud">0</span></span>
        </div>
    </div>

</body>

</html>
