<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" lang="fr" xml:lang="fr">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Thesaurus</title>
    <link rel="stylesheet" type="text/css" href="StyleLabo14.css" />

    <script src="WebGl.js"></script>
    <script src="ShaderCouleursTextures.js"></script>
    <script src="glMatrix-0.9.5.min.js"></script>
    <script src="Transformations.js"></script>
    <script src="./Objets/Camera.js"></script>
    <script src="Textures.js"></script>
    <script src="Dedale.js"></script>
    <script src="Objets3D.js"></script>
    <script src="Dessin.js"></script>
    <script src="./Objets/Tresor.js"></script>
    <script src="./Objets/Fleches.js"></script>


    <script type="text/javascript">

        var objgl = null;
        var objProgShaders = null;
        var objScene3D = null;

        var TEX_TRANSPARENT = 0;
        var TEX_PIERRES = 1;
        var TEX_TRESOR = 2;
        var TEX_CIEL = 3;

        const HAUTEUR_PLAFOND = 2;

        async function demarrer() {
            var objCanvas = document.getElementById('monCanvas');
            objgl = initWebGL(objCanvas);
            objProgShaders = initShaders(objgl);
            objScene3D = await initScene3D(objgl);
            objgl.enable(objgl.DEPTH_TEST);
            objgl.disable(objgl.CULL_FACE);
            effacerCanevas(objgl);
            dessiner(objgl, objProgShaders, objScene3D);
        }

        async function initScene3D(objgl) {
            var objScene3D = new Object();
            var tabObjets3D = new Array();

            objScene3D.dedale = creerDedale(31);
            objScene3D.textures = await creerTextures(objgl, [
                './Images/Transparent.gif',
                './Images/Pierres.jpg',
                './Images/coffre.jpg',
                './Images/Cloudy_sky.png'
            ]);

            // ── PLANCHER COULOIRS ──────────────────────────────────────
            let plancherCouloir = new Object();
            plancherCouloir.vertex = creerGeometriePlan(objgl);
            plancherCouloir.couleurs = creerCouleursBuffer(objgl, [0.3, 0.3, 0.3, 1.0], 4);
            plancherCouloir.maillage = null;
            plancherCouloir.texels = null;
            plancherCouloir.transformations = creerTransformations();
            plancherCouloir.vertex.typeDessin = objgl.TRIANGLE_FAN;
            setPositionsXYZ([15.5, 0, 15.5], plancherCouloir.transformations);
            setEchellesXYZ([15.5, 1, 15.5], plancherCouloir.transformations);
            tabObjets3D.push(plancherCouloir);

            // ── PLANCHER ENCLOS ────────────────────────────────────────
            let plancherEnclos = new Object();
            plancherEnclos.vertex = creerGeometriePlan(objgl);
            plancherEnclos.couleurs = creerCouleursBuffer(objgl, [0.6, 0.4, 0.1, 1.0], 4);
            plancherEnclos.maillage = null;
            plancherEnclos.texels = null;
            plancherEnclos.transformations = creerTransformations();
            plancherEnclos.vertex.typeDessin = objgl.TRIANGLE_FAN;
            setPositionsXYZ([15.5, 0.01, 15.5], plancherEnclos.transformations);
            setEchellesXYZ([1.5, 1, 1.5], plancherEnclos.transformations);
            tabObjets3D.push(plancherEnclos);

            // ── PLAFOND ────────────────────────────────────────────────
            let plafond = creerPlanTexturé(objgl, TEX_CIEL, 1.0);
            setPositionsXYZ([15.5, HAUTEUR_PLAFOND, 15.5], plafond.transformations);
            setEchellesXYZ([15.5, 1, 15.5], plafond.transformations);
            //setAngleX(180, plafond.transformations); // retourner pour regarder vers le bas
            tabObjets3D.push(plafond);

            // ── MURS ───────────────────────────────────────────────────
            for (let i = 0; i < TAILLE_DEDALE; i++) {
                for (let j = 0; j < TAILLE_DEDALE; j++) {
                    let cellule = objScene3D.dedale[i][j];
                    let mur = null;

                    if (cellule == MUR_FIXE) {
                        mur = creerCubeColoré(objgl, [0.1, 0.6, 0.1, 1.0]);
                    } else if (cellule == MUR_OUVRABLE) {
                        mur = creerCubeColoré(objgl, [0.7, 0.1, 0.1, 1.0]);
                    }

                    if (mur != null) {
                        setPositionsXYZ([j, 0, i], mur.transformations);
                        setEchellesXYZ([1, HAUTEUR_PLAFOND, 1], mur.transformations); // murs à la bonne hauteur
                        tabObjets3D.push(mur);
                    }
                }
            }

            // ── TRÉSOR ─────────────────────────────────────────────────
            var tresor = creerTresore(objgl, [1.0, 1.0, 1.0, 1.0]);
            let randomXTresor, randomZTresor;
            do {
                randomXTresor = Math.floor(Math.random() * TAILLE_DEDALE);
                randomZTresor = Math.floor(Math.random() * TAILLE_DEDALE);
            } while (objScene3D.dedale[randomZTresor][randomXTresor] !== COULOIR);
            setPositionsXYZ([randomXTresor, 0, randomZTresor], tresor.transformations);
            setEchellesXYZ([0.7, 0.4, 0.4], tresor.transformations);
            tabObjets3D.push(tresor);

            objScene3D.tabObjets3D = tabObjets3D;


            // ── CAMÉRA ─────────────────────────────────────────────────
            var camera = creerCamera();
            setPositionsCameraXYZ([15.5, 0.5, 15.5], camera);
            setCiblesCameraXYZ([15.5, 0.5, 16.5], camera);
            setOrientationsXYZ([0, 1, 0], camera);
            objScene3D.camera = camera;

            // setPositionsCameraXYZ([15.5, 90, 15.5], camera);    // Positioned directly above center
            // setCiblesCameraXYZ([15.5, 0, 15.5], camera);        // Looking straight down at the center
            // setOrientationsXYZ([0, 0, 1], camera);              // Up vector pointing north (positive Z)
            // objScene3D.camera = camera;


            // ── FLÈCHES ────────────────────────────────────────────────
            objScene3D.tabFleches = [];
            let nbFleches = 18;

            let distanceMinimale = 3;

            for (let i = 0; i < nbFleches; i++) {
                var fleche = creerFleche(objgl, [1.0, 0.84, 0.0, 1.0]);
                setEchellesXYZ([0.2, 0.2, 0.2], fleche.transformations);
                let randomX, randomZ;
                let celluleValide = false;

                while (!celluleValide) {
                    randomX = Math.floor(Math.random() * TAILLE_DEDALE);
                    randomZ = Math.floor(Math.random() * TAILLE_DEDALE);

                    if (objScene3D.dedale[randomZ][randomX] === COULOIR &&
                        !(randomX === randomXTresor && randomZ === randomZTresor)) {
                        let tropProche = false;

                        for (let j = 0; j < objScene3D.tabFleches.length; j++) {
                            let posFlecheExistante = getPositionsXYZ(objScene3D.tabFleches[j].transformations);

                            let xExistant = posFlecheExistante[0] - 0.5;
                            let zExistant = posFlecheExistante[2] - 0.5;

                            let distance = Math.sqrt(Math.pow(randomX - xExistant, 2) + Math.pow(randomZ - zExistant, 2));

                            if (distance < distanceMinimale) {
                                tropProche = true;
                                break;
                            }
                        }

                        if (!tropProche) {
                            celluleValide = true;
                        }
                    }
                }

                setPositionsXYZ([randomX + 0.5, 0.6, randomZ + 0.5], fleche.transformations);
                
                objScene3D.tabFleches.push(fleche);
                tabObjets3D.push(fleche);
            }

            pointeVersTresor(objScene3D);

            return objScene3D; // ← toujours à la fin
        }

    </script>
</head>

<body onload="demarrer()">
    <header class="sTexteCentre sLargeurDiv sEntete">

</body>

</html>
